      focus: "Production readiness, scaling verification, deployment plan"
      criteria:
        - "Story 3.7: Rate limiting implemented, concurrency controls verified"
        - "Load test: 10K concurrent executions passing"
        - "Stress test: No memory leaks, system stable under sustained load"
        - "Staging deployment successful and stable for 48 hours"
        - "Rollback plan documented and tested"
        - "SRE sign-off on production readiness"

