# WAVES DEFINITION
waves:

  # WAVE 1: Foundation & Core Reliability (Weeks 1-8)
  1:
    name: "Foundation & Core Reliability"
    description: "Execution engine foundation + webhook reliability + cron scheduling"
    timeline: "Weeks 1-8"
    status: "pending"
    parallel: true

    stories: ["3.1", "3.2", "3.3"]
    tracks:
      A:
        name: "Execution Engine & Webhook Reliability"
        stories: ["3.1", "3.2"]
        parallel: false
        description: "Sequential: 3.1 foundation, then 3.2 depends on it"

      B:
        name: "Scheduled Automations"
        stories: ["3.3"]
        parallel: true
        description: "Parallel to Track A (independent scheduler)"

    # Merge strategy after wave completion
    merge:
      order: ["3.1", "3.2", "3.3"]
      conflictRisk: "low"
      notes: "Separate codebases (execution/, webhooks/, scheduler/). Minimal conflict risk."
      tag: "wave-1-complete"

    # Quality gate for this wave
    gate:
      agent: "@architect"
      focus: "Cross-story integration, architecture consistency, backward compatibility"
      criteria:
        - "Story 3.1: Execution engine tested, 95% coverage"
        - "Story 3.2: DLQ tested, 99% delivery reliability verified"
        - "Story 3.3: Scheduler passing reliability test"
        - "All integration tests passing"
        - "Wave 2 automations execute without modification"
        - "No performance regression"

  # WAVE 2: Advanced Features & Observability (Weeks 7-12)
  2:
    name: "Advanced Features & Observability"
    description: "Multi-step workflows + execution history + real-time dashboard"
    timeline: "Weeks 7-12"
    status: "pending"
    parallel: true
    dependencies: [1]

    stories: ["3.4", "3.5", "3.6"]
    tracks:
      A:
        name: "Multi-Step Workflow Builder"
        stories: ["3.4"]
        parallel: true

      B:
        name: "Execution History & Audit Logging"
        stories: ["3.5"]
        parallel: true

      C:
        name: "Real-Time Dashboard & Analytics"
        stories: ["3.6"]
        parallel: true

    merge:
      order: ["3.4", "3.5", "3.6"]
      conflictRisk: "low"
      notes: "All in separate subsystems (workflows, audit, UI). Can merge in any order."
      tag: "wave-2-complete"

    gate:
      agent: "@architect"
      focus: "Feature completeness, E2E testing, performance benchmarks"
      criteria:
        - "Story 3.4: Workflow DAG visualization tested, backward compatible"
        - "Story 3.5: Audit logs searchable, export working"
        - "Story 3.6: Dashboard real-time updates within 2 seconds"
        - "All E2E tests passing"
        - "Performance stable (P99 latency ±20% baseline)"

  # WAVE 3: Scaling & Integration (Weeks 13-14)
  3:
