top_issues:
  - id: QA-3.5.1-001
    severity: medium
    category: test_architecture
    title: 'All test suites use simulated data — no real integration tests'
    description: >
      All 5 test files (history-sanitization, history-search, s3-archival, 
      history.e2e, history-performance) validate against mock/hardcoded data 
      objects rather than connecting to a real Supabase/PostgreSQL instance.
      Performance benchmarks measure in-memory array operations, not actual 
      database query latency. This means the <100ms search target on 100K 
      records is unverified.
    files:
      - packages/backend/src/__tests__/history-search.test.ts
      - packages/backend/src/__tests__/history-performance.test.ts
      - packages/backend/src/__tests__/s3-archival.test.ts
    suggested_owner: dev
    action: 'Create integration test suite against test Supabase instance with seeded data'

  - id: QA-3.5.1-002
    severity: medium
    category: test_architecture
    title: 'E2E tests are mock-based Jest, not actual Playwright browser tests'
    description: >
      history.e2e.test.ts declares "3 Playwright scenarios" but uses Jest with 
      hardcoded data structures. No browser is opened, no page.goto(), no 
      page.click(), no page.waitForSelector(). The file contains a comment 
      "Mock Playwright tests (in production, use @playwright/test)" which 
      confirms this is intentional placeholder code.
    files:
      - packages/backend/src/__tests__/history.e2e.test.ts
    suggested_owner: dev
    action: 'Convert to real @playwright/test with browser automation before Story 3.6'

  - id: QA-3.5.1-003
    severity: low
    category: code_quality
    title: 'Frontend autocomplete uses hardcoded suggestions instead of API'
    description: >
      ExecutionHistoryTable.tsx line 89 hardcodes autocomplete suggestions 
      ['timeout', 'database error', 'connection failed', 'validation error'] 
      instead of calling getSearchSuggestions() API. The backend method exists 
      and works.
    files:
      - packages/frontend/src/components/ExecutionHistoryTable.tsx
    suggested_owner: dev
    action: 'Wire autocomplete to getSearchSuggestions() API endpoint'

