    story_3_4: "UI Builder & Branching (Task 3.4.3-3.4.6) — PARALLEL"
    story_3_5: "History API & Detail Page (Task 3.5.3-3.5.5) — PARALLEL"
    story_3_6: "Dashboard Design (Task 3.6.1-3.6.2) — PARALLEL"
