## Decisions Made

decisions:
  - decision: 'Exponential backoff intervals: 1s, 5s, 30s, 5m, 30m (5 attempts max)'
    rationale: 'Industry standard for webhook retries, reduces load on failed endpoints'

  - decision: 'DLQ as separate table for failed webhooks'
    rationale: 'Clear separation of concerns, easier to query and manage failures'

  - decision: 'Immutable audit logs with separate retention policy'
    rationale: 'Enable debugging and compliance, independent of webhook_deliveries cleanup'

  - decision: 'HMAC-SHA256 with constant-time comparison'
    rationale: 'Timing-safe to prevent timing attacks on signature validation'

  - decision: 'Async database inserts for execution tracking'
    rationale: 'Non-blocking operations, no impact on webhook delivery latency'

