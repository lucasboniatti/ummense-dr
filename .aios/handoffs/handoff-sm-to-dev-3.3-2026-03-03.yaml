implementation_notes:
  - "Scheduler runs every 60 seconds - non-blocking async processing"
  - "Use cron-parser npm package for battle-tested cron evaluation"
  - "Timezone handling is CRITICAL - users expect local time schedules"
  - "Skipped executions are logged but NOT retried (no catch-up behavior)"
  - "Drift tracking helps diagnose timing precision issues"
  - "next_execution_at is precomputed (not calculated on every request)"
  - "Wave 2 compatibility: ensure scheduled automations work like manual triggers"
  - "Consider scheduler resilience: handle database connection failures gracefully"

