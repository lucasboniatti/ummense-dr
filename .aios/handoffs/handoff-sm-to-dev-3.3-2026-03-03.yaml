user_story: |
  "As a user managing recurring tasks, I want to schedule automations to run
   on a recurring basis using cron expressions, so that I can automate daily
   reports, weekly syncs, and monthly cleanups without manual intervention."

acceptance_criteria:
  - "AC#1 [CRITICAL]: Automation editor supports Scheduled trigger with cron input"
  - "AC#2 [HIGH]: Cron expressions validated at save with preview of next 3 executions"
  - "AC#3 [HIGH]: Scheduler evaluates cron at 60s intervals with ±2 min precision"
  - "AC#4 [HIGH]: Audit log records scheduled_time, execution_time, drift_seconds"
  - "AC#5 [MEDIUM]: Enable/disable schedule without data loss"
  - "AC#6 [MEDIUM]: UI shows 'Next scheduled: Tuesday 2:30 PM'"
  - "AC#7 [MEDIUM]: Skipped executions logged (scheduler down) but not retried"

technical_approach:
  backend_services:
    - SchedulerService: evaluateCron, getNextExecutions, validateCron, processDueSchedules
    - SchedulerJob: background task running every 60 seconds
    - Schedule API routes + controller
  frontend_components:
    - CronExpressionInput (with validation and preview)
    - CronPresets (hourly, daily 9am, weekly, monthly shortcuts)
    - Schedule list view with enable/disable toggle
  database_changes:
    - NEW: automation_schedules table (cron_expression, timezone, enabled, etc)
    - EXTEND: automation_executions (add scheduled_time, execution_drift_seconds)
    - Index: (enabled, next_execution_at) for scheduler queries

