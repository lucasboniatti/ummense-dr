# TECHNICAL DECISIONS
# ============================================================================
decisions:
  - decision: "Used WebSocket (not gRPC or GraphQL Subscriptions)"
    rationale: "Real-time HTML5 native support, simpler for browser clients, proven for <500ms latency"

  - decision: "Redis pub/sub with in-memory fallback"
    rationale: "Horizontal scaling without Redis dependency in dev/test environments"

  - decision: "Circuit breaker pattern for Redis reliability"
    rationale: "Graceful degradation if Redis unavailable; automatic recovery testing"

  - decision: "Delta detection over full history replay"
    rationale: "Reduces message size (<1KB) and network bandwidth; efficient for high-frequency updates"

  - decision: "JWT authentication for WebSocket"
    rationale: "Consistent with REST API auth; user_id extracted from JWT claims"

  - decision: "Adaptive heartbeat (doubles when idle)"
    rationale: "Reduces server load during periods of inactivity; maintains connection health"

