    - decision: "Extend Story 3.1 schema"
      rationale: "ExecutionService already handles execution tracking; this story adds observability layer"
      details: "Reuse automation_executions + automation_steps tables, add audit_logs + user_retention_policies"

    - decision: "Async audit logging"
      rationale: "Non-blocking audit writes prevent performance degradation"
      details: "Use async DB inserts via middleware; capture user_id, action, changes, ip_address, user_agent"

    - decision: "Composite indexes for performance"
      rationale: "Story 3.1 established indexing strategy; apply to history queries"
      details: "Create (user_id, automation_id, status) and (created_at DESC) indexes"

    - decision: "Background retention cleanup"
      rationale: "Nightly job prevents concurrent execution impact"
      details: "Run at 2 AM UTC; archive to S3 if enabled; delete old records per policy"

