<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tasks Flow Logo - Blue Theme -->
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="14" fill="url(#gradient-main)"/>

  <!-- Flow lines representing task flow -->
  <path d="M14 16h10l-4 4h10l-4 4h10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Checkmark dots representing completed tasks -->
  <circle cx="14" cy="16" r="2.5" fill="white"/>
  <circle cx="26" cy="20" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="32" cy="24" r="2.5" fill="white" opacity="0.7"/>

  <!-- Arrow pointing forward (flow direction) -->
  <path d="M34 28l2 4-2 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <defs>
    <linearGradient id="gradient-main" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
</svg>