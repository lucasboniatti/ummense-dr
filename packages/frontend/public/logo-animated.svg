<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tasks Flow Animated Logo - Blue Theme -->
  <style>
    @keyframes flowPulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 0.6; }
    }
    @keyframes dotPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    @keyframes arrowMove {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(2px); }
    }
    .flow-line { animation: flowPulse 2s ease-in-out infinite; }
    .dot-1 { animation: dotPulse 1.5s ease-in-out infinite; }
    .dot-2 { animation: dotPulse 1.5s ease-in-out infinite 0.3s; }
    .dot-3 { animation: dotPulse 1.5s ease-in-out infinite 0.6s; }
    .arrow { animation: arrowMove 1s ease-in-out infinite; transform-origin: center; }
  </style>

  <!-- Background rounded square -->
  <rect width="48" height="48" rx="14" fill="url(#gradient-animated)"/>

  <!-- Flow lines representing task flow -->
  <path class="flow-line" d="M14 16h10l-4 4h10l-4 4h10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkmark dots representing completed tasks -->
  <circle class="dot-1" cx="14" cy="16" r="2.5" fill="white"/>
  <circle class="dot-2" cx="26" cy="20" r="2.5" fill="white"/>
  <circle class="dot-3" cx="32" cy="24" r="2.5" fill="white"/>

  <!-- Arrow pointing forward (flow direction) -->
  <g class="arrow">
    <path d="M34 28l2 4-2 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <defs>
    <linearGradient id="gradient-animated" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
</svg>